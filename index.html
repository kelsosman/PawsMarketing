<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws — HomeDog Content Assistant</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span style="font-size:1.5rem">🐾</span>
    <div>
      <h1>Paws</h1>
      <span class="header-subtitle">by HomeDog</span>
    </div>
  </header>

  <!-- Navigation (top on desktop, bottom on mobile via CSS) -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-tab="create">
      <span class="nav-icon">✏️</span>
      <span>Create</span>
    </button>
    <button class="nav-btn" data-tab="calendar">
      <span class="nav-icon">📅</span>
      <span>Calendar</span>
    </button>
    <button class="nav-btn" data-tab="drafts">
      <span class="nav-icon">📄</span>
      <span>Drafts</span>
    </button>
    <button class="nav-btn" data-tab="performance">
      <span class="nav-icon">📊</span>
      <span>Performance</span>
    </button>
  </nav>

  <!-- ═══════════ CREATE TAB ═══════════ -->
  <main id="tab-create" class="tab-content active">

    <!-- Content Type -->
    <div class="form-group">
      <label for="contentType">What are you posting?</label>
      <select id="contentType">
        <option value="event">Event</option>
        <option value="daily">Daily / Story Post</option>
        <option value="promo">Membership / Promo</option>
        <option value="general">General Post</option>
      </select>
    </div>

    <!-- Event-Specific Fields -->
    <div id="eventFields">
      <div class="form-group">
        <label for="eventType">Event Type</label>
        <select id="eventType">
          <option value="puppy-yoga">Puppy Yoga</option>
          <option value="vendor-market">Vendor Market / Pop-Up</option>
          <option value="adoption">Adoption Event</option>
          <option value="private-party">Private Party / Corporate</option>
          <option value="coworking-promo">Coworking Promo</option>
          <option value="run-club">Run Club</option>
          <option value="record-club">Record / Vinyl Night</option>
          <option value="singles-night">Singles Night</option>
          <option value="concert">Concert / Live Music</option>
          <option value="general">Other / Custom</option>
        </select>
      </div>
      <div class="form-group">
        <label for="eventName">Event Name</label>
        <input type="text" id="eventName" placeholder="e.g., Paws & Flow Puppy Yoga">
      </div>
      <div class="form-group">
        <label for="eventDate">Event Date</label>
        <input type="date" id="eventDate">
      </div>
      <div class="form-group">
        <label for="eventTime">Event Time</label>
        <input type="text" id="eventTime" placeholder="e.g., 10am - 12pm">
      </div>
      <div class="form-group">
        <label for="eventPrice">Price</label>
        <input type="text" id="eventPrice" placeholder='e.g., Free, $15, Free for members / $15 drop-in'>
      </div>
      <div class="form-group">
        <label for="eventPartner">Partner / Collaborator</label>
        <input type="text" id="eventPartner" placeholder="e.g., PawsCo Rescue">
      </div>
      <div class="form-group">
        <label for="targetAudience">Target Audience (optional)</label>
        <input type="text" id="targetAudience" placeholder='e.g., singles 25-40, dog moms, remote workers'>
      </div>
    </div>

    <!-- Platforms -->
    <div class="form-group">
      <label>Where are you posting?</label>
      <div class="platform-grid">
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="instagram" checked> Instagram
        </label>
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="story"> IG Story
        </label>
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="facebook"> Facebook
        </label>
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="tiktok"> TikTok
        </label>
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="eventbrite"> Eventbrite
        </label>
        <label class="platform-option">
          <input type="checkbox" class="platform-check" value="ad-copy"> Ad Copy
        </label>
      </div>
    </div>

    <!-- Paid Post Toggle -->
    <div class="toggle-row">
      <label for="isPaid">This is a paid/promoted post</label>
      <label class="toggle-switch">
        <input type="checkbox" id="isPaid">
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- Ad Fields (conditional) -->
    <div id="adFields" class="hidden">
      <div class="form-group">
        <label for="campaignGoal">Campaign Goal</label>
        <select id="campaignGoal">
          <option value="awareness">Awareness</option>
          <option value="signups">Event Signups</option>
          <option value="memberships">Membership Sales</option>
          <option value="traffic">General Traffic</option>
        </select>
      </div>
    </div>

    <!-- Post Date (for calendar) -->
    <div class="form-group">
      <label for="postDate">Post Date (for calendar scheduling)</label>
      <input type="date" id="postDate">
    </div>

    <!-- Photo Upload -->
    <div class="form-group">
      <label>Photo (optional)</label>
      <div class="photo-drop-area" id="photoDropArea">
        <span class="upload-icon">📷</span>
        <span class="upload-text">Tap to upload or drag photo here</span>
        <span class="upload-text" style="font-size:0.75rem;color:var(--text-muted)">JPG, PNG, HEIC, WEBP — up to 10 photos</span>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple hidden>
      <div class="photo-previews" id="photoPreviews"></div>
    </div>

    <!-- Raw Notes -->
    <div class="form-group">
      <label for="rawNotes">Tell Paws what's up (paste anything, Paws will figure it out)</label>
      <div class="notes-wrapper">
        <textarea id="rawNotes" placeholder="Brain dump here... e.g., puppy yoga saturday march 22 10am with pawsco free for members $15 drop-in bring your own mat"></textarea>
        <button type="button" id="voiceBtn" aria-label="Start voice input" title="Voice input">🎤</button>
      </div>
    </div>

    <!-- Optional Fields -->
    <div class="form-group">
      <label for="customHashtags">Custom Hashtags (optional)</label>
      <input type="text" id="customHashtags" placeholder="e.g., #DenverPuppyYoga #WashPark">
    </div>
    <div class="form-group">
      <label for="toneOverride">Tone</label>
      <select id="toneOverride">
        <option value="default">Default (playful + warm)</option>
        <option value="playful">Extra Playful</option>
        <option value="informative">More Serious / Informative</option>
        <option value="hype">Hype / Excited</option>
      </select>
    </div>

    <!-- Generate Button (sticky on mobile) -->
    <button class="btn btn-primary" id="generateBtn">🐾 Let Paws Cook</button>

    <!-- Output Section -->
    <section id="outputSection" class="hidden">
      <h2 style="margin-bottom:12px">Paws Says...</h2>
      <div id="outputCards"></div>
      <div id="outputActions" class="output-actions"></div>
    </section>
  </main>

  <!-- ═══════════ CALENDAR TAB ═══════════ -->
  <section id="tab-calendar" class="tab-content">
    <div id="calendarView"></div>
    <div id="calendarDetail" class="hidden"></div>
  </section>

  <!-- ═══════════ DRAFTS TAB ═══════════ -->
  <section id="tab-drafts" class="tab-content">
    <h2 style="margin-bottom:12px">Saved Drafts</h2>
    <div id="draftsList"></div>
  </section>

  <!-- ═══════════ PERFORMANCE TAB ═══════════ -->
  <section id="tab-performance" class="tab-content">
    <h2 style="margin-bottom:12px">Performance</h2>
    <div id="performanceView"></div>
  </section>

  <!-- Scripts -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
